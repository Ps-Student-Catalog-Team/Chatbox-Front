<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>重置账户</title>
    <script src="./tailwind.js"></script>
    <style> 
        #toast { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); } 
    </style>
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center p-4 relative overflow-hidden select-none">

    <div id="toast" style="transform: translate(-50%, -100px); opacity: 0;" class="fixed top-6 left-1/2 z-50 text-white text-xs font-semibold px-6 py-3 rounded-full shadow-lg flex items-center space-x-2 transition-all duration-300">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        <span id="toastText">提示内容</span>
    </div>

    <div class="bg-white rounded-[28px] p-8 w-full max-w-sm shadow-xl space-y-5 border border-gray-100">
        <div class="text-center">
            <h2 class="text-xl font-bold text-gray-800">重置账户密码</h2>
            <p class="text-xs text-gray-400 mt-1">请输入要找回的用户账户及新密码</p>
        </div>
        <input type="text" id="user" placeholder="需要重置的用户名" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition">
        <input type="password" id="newPwd" placeholder="输入新密码" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition">
        <button onclick="resetPassword()" class="w-full bg-blue-600 text-white rounded-xl py-3.5 font-semibold text-sm shadow-md hover:bg-blue-700 active:scale-95 transition">提交重置密码</button>
        <div class="flex gap-3 mt-3">
            <button onclick="window.location.href='index.html'" class="flex-1 bg-slate-100 text-slate-700 rounded-xl py-3 text-sm font-semibold hover:bg-slate-200 transition">返回登录</button>
            <button onclick="window.location.reload()" class="flex-1 bg-slate-100 text-slate-700 rounded-xl py-3 text-sm font-semibold hover:bg-slate-200 transition">刷新页面</button>
        </div>
    </div>

    <script>
        function showToast(text, isErr = false) {
            const toast = document.getElementById('toast');
            const toastText = document.getElementById('toastText');
            toastText.innerText = text;
    
            if (isErr) {
                toast.classList.remove('bg-green-500');
                toast.classList.add('bg-red-500');
            } else {
                toast.classList.remove('bg-red-500');
                toast.classList.add('bg-green-500');
            }
        
            toast.style.transform = "translate(-50%, 0px)";
            toast.style.opacity = "1";

            setTimeout(() => {
                toast.style.transform = "translate(-50%, -100px)";
                toast.style.opacity = "0";
            }, 3000);
        }

        function restoreUsernameFromQuery() {
            const params = new URLSearchParams(window.location.search);
            const username = params.get('username');
            if (username) {
                document.getElementById('user').value = username;
            }
        }

        async function resetPassword() {
            const username = document.getElementById('user').value.trim();
            const newPassword = document.getElementById('newPwd').value.trim();
            
            if(!username || !newPassword) {
                return showToast("❌ 请完整填写用户名和新密码！", true);
            }

            try {
                const res = await fetch('/api/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: username, password: newPassword })
                });
                const data = await res.json();
                
                if (res.ok) {
                    showToast("🟢 密码修改成功！3秒后返回登录页...");
                    setTimeout(() => {
                        window.location.href = new URL('index.html', window.location.href).href;
                    }, 3000);
                } else {
                    showToast(data.message || "❌ 重置失败", true);
                }
            } catch (err) {
                showToast("❌ 网络请求失败", true);
            }
        }

        window.addEventListener('DOMContentLoaded', restoreUsernameFromQuery);
    </script>
</body>
</html>
