<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>账户管理</title>
    <script src="./tailwind.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            padding: 40px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            position: relative;
        }

        .profile-section {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        .avatar-container {
            flex-shrink: 0;
            position: relative;
        }

        .avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            font-weight: bold;
            object-fit: cover;
            cursor: pointer;
            border: 3px solid #f0f0f0;
            transition: transform 0.2s;
        }

        .avatar:hover {
            transform: scale(1.05);
        }

        .info-section {
            display: flex;
            flex-direction: column;
            justify-content: center;
            flex: 1;
        }

        .username-container {
            margin-bottom: 8px;
        }

        .username-label {
            display: none;
            font-size: 12px;
            color: #666;
            margin-bottom: 4px;
        }

        .username {
            font-size: 24px;
            font-weight: 600;
            color: #333;
            outline: none;
            border: none;
            background: transparent;
            width: 100%;
            cursor: pointer;
            padding: 4px 0;
        }

        .username:focus {
            background: rgba(102, 126, 234, 0.1);
            border-radius: 4px;
            padding: 4px 8px;
        }

        .signature-container {
            margin-bottom: 0;
        }

        .signature-label {
            display: none;
            font-size: 12px;
            color: #666;
            margin-bottom: 4px;
        }

        .signature {
            font-size: 14px;
            color: #999;
            outline: none;
            border: none;
            background: transparent;
            width: 100%;
            cursor: pointer;
            padding: 4px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .signature:focus {
            background: rgba(102, 126, 234, 0.1);
            border-radius: 4px;
            padding: 4px 8px;
            white-space: normal;
            overflow: visible;
        }

        .button-group {
            position: absolute;
            bottom: 20px;
            width: calc(100% - 80px);
            display: flex;
            gap: 12px;
            justify-content: space-between;
        }

        .btn {
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn-modify {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-modify:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-save {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            margin-left: auto;
        }

        .btn-save:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-save:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-back {
            background: #f0f0f0;
            color: #333;
            position: absolute;
            top: 20px;
            left: 20px;
            width: 36px;
            height: 36px;
            padding: 0;
        }

        .btn-back:hover {
            background: #e0e0e0;
        }

        #backgroundInput {
            display: none;
        }

        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .loading-overlay.show {
            display: flex;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 999;
        }

        .toast.show {
            opacity: 1;
        }

        .toast.success {
            background: #4caf50;
        }

        .toast.error {
            background: #f44336;
        }
    </style>
</head>
<body>
    <button class="btn-back" onclick="goBack()">← </button>

    <div class="container">
        <div class="profile-section">
            <div class="avatar-container">
                <img id="avatarImg" class="avatar" src="" alt="头像" onclick="document.getElementById('backgroundInput').click()">
            </div>
            <div class="info-section">
                <div class="username-container">
                    <label class="username-label">账号名</label>
                    <input type="text" id="username" class="username" readonly>
                </div>
                <div class="signature-container">
                    <label class="signature-label">个性签名</label>
                    <input type="text" id="signature" class="signature" placeholder="添加个性签名...">
                </div>
            </div>
        </div>
    </div>

    <div class="button-group">
        <button class="btn btn-modify" onclick="document.getElementById('backgroundInput').click()">修改背景</button>
        <button class="btn btn-save" id="saveBtn" onclick="saveUserInfo()">保存</button>
    </div>

    <input type="file" id="backgroundInput" accept="image/*" onchange="uploadBackground(event)">

    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        let currentUser = null;
        let originalSignature = '';
        let backgroundFile = null;

        async function init() {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = '/pages/index.html';
                return;
            }

            try {
                const response = await fetch('/api/user/info', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (response.ok) {
                    const user = await response.json();
                    currentUser = user;
                    originalSignature = user.signature || '';
                    
                    document.getElementById('username').value = user.username;
                    document.getElementById('signature').value = user.signature || '';
                    
                    // 设置背景
                    if (user.background_url) {
                        document.body.style.backgroundImage = `url('${user.background_url}')`;
                    } else {
                        document.body.style.background = 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)';
                    }

                    // 设置头像
                    if (user.avatar_url) {
                        document.getElementById('avatarImg').src = user.avatar_url;
                    } else {
                        document.getElementById('avatarImg').textContent = user.username.charAt(0).toUpperCase();
                        document.getElementById('avatarImg').style.fontSize = '28px';
                    }
                } else {
                    showToast('加载用户信息失败', 'error');
                    window.location.href = '/pages/index.html';
                }
            } catch (error) {
                console.error('Error:', error);
                showToast('加载失败，请重新登录', 'error');
                window.location.href = '/pages/index.html';
            }
        }

        async function saveUserInfo() {
            const token = localStorage.getItem('token');
            const signature = document.getElementById('signature').value;

            // 检查是否有改动
            if (signature === originalSignature && !backgroundFile) {
                showToast('没有改动', 'error');
                return;
            }

            showLoading(true);

            try {
                // 保存签名
                if (signature !== originalSignature) {
                    const response = await fetch('/api/user/update', {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${token}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ signature })
                    });

                    if (!response.ok) {
                        showToast('更新签名失败', 'error');
                        showLoading(false);
                        return;
                    }
                    originalSignature = signature;
                }

                // 保存背景（如果有新上传的）
                if (backgroundFile) {
                    const formData = new FormData();
                    formData.append('background', backgroundFile);
                    
                    const bgResponse = await fetch('/api/user/background', {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${token}`
                        },
                        body: formData
                    });

                    if (!bgResponse.ok) {
                        showToast('上传背景失败', 'error');
                        showLoading(false);
                        return;
                    }
                    
                    const bgData = await bgResponse.json();
                    document.body.style.backgroundImage = `url('${bgData.url}')`;
                    backgroundFile = null;
                }

                showToast('保存成功', 'success');
            } catch (error) {
                console.error('Error:', error);
                showToast('保存失败，请重试', 'error');
            } finally {
                showLoading(false);
            }
        }

        async function uploadBackground(event) {
            const file = event.target.files[0];
            if (!file) return;

            // 验证文件类型
            if (!file.type.startsWith('image/')) {
                showToast('请选择图片文件', 'error');
                return;
            }

            // 验证文件大小（限制5MB）
            if (file.size > 5 * 1024 * 1024) {
                showToast('图片大小不能超过5MB', 'error');
                return;
            }

            // 预览背景
            const reader = new FileReader();
            reader.onload = (e) => {
                document.body.style.backgroundImage = `url('${e.target.result}')`;
                backgroundFile = file;
            };
            reader.readAsDataURL(file);

            // 清空input以便下次选择相同文件
            event.target.value = '';
        }

        function showLoading(show) {
            const overlay = document.getElementById('loadingOverlay');
            if (show) {
                overlay.classList.add('show');
                document.getElementById('saveBtn').disabled = true;
            } else {
                overlay.classList.remove('show');
                document.getElementById('saveBtn').disabled = false;
            }
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        function goBack() {
            window.location.href = '/pages/index.html';
        }

        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
