<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAN Chat v2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style> 
        ::-webkit-scrollbar { display: none; } 
        #toast { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    </style>
</head>
<body class="bg-gray-50 h-screen flex flex-col font-sans select-none antialiased relative">

    <div id="toast" style="transform: translate(-50%, -100px); opacity: 0;" class="fixed top-6 left-1/2 z-50 text-white text-xs font-semibold px-6 py-3 rounded-full shadow-lg pointer-events-none flex items-center space-x-2">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        <span id="toastText">提示内容</span>
    </div>

    <div id="authOverlay" class="fixed inset-0 bg-gradient-to-tr from-blue-700 to-indigo-600 z-40 flex flex-col justify-center items-center p-6">
        <div class="bg-white rounded-[28px] p-8 w-full max-w-sm shadow-2xl space-y-5">
            <div class="text-center">
                <h2 class="text-2xl font-bold text-gray-900">局域网聊天室</h2>
                <p class="text-xs text-gray-400 mt-1">请输入账号进入或者注册新用户</p>
            </div>
            <input type="text" id="usernameInput" placeholder="请输入用户名" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition">
            <input type="password" id="passwordInput" placeholder="请输入密码" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition">
            <div class="flex space-x-3 pt-2">
                <button onclick="handleAuth('login')" class="flex-1 bg-blue-600 text-white rounded-xl py-3 font-semibold text-sm shadow-md hover:bg-blue-700 active:scale-95 transition">登录</button>
                <button onclick="handleAuth('register')" class="flex-1 bg-gray-100 text-gray-700 rounded-xl py-3 font-medium text-sm hover:bg-gray-200 active:scale-95 transition">注册</button>
            </div>
            <div class="text-center pt-2">
                <a href="/forgot-password.html" class="text-xs text-blue-600 hover:underline font-medium">忘记密码？去网页重置账号</a>
            </div>
        </div>
    </div>

    <div class="bg-white text-gray-800 px-6 py-4 shadow-sm flex justify-between items-center z-10 border-b border-gray-100">
        <div>
            <div class="text-lg font-bold tracking-wide text-gray-900" id="roomTitle">局域网聊天室</div>
            <div class="text-[10px] text-green-500 font-medium flex items-center mt-0.5">
                <span class="w-1.5 h-1.5 bg-green-500 rounded-full mr-1.5 animate-pulse"></span>服务器连接正常
            </div>
        </div>
        <label class="flex items-center cursor-pointer bg-gray-100 px-3 py-1.5 rounded-full">
            <span class="mr-2 text-xs font-semibold text-gray-600">免打扰</span>
            <input type="checkbox" id="dndToggle" class="w-4 h-4 text-blue-600 rounded focus:ring-0">
        </label>
    </div>

    <div id="chatBox" class="flex-1 overflow-y-auto p-5 space-y-4 bg-gray-50"></div>

    <div class="p-4 bg-gray-50">
        <div class="bg-white p-2 rounded-[32px] shadow-lg border border-gray-100 flex items-center space-x-2 max-w-4xl mx-auto">
            <button class="p-2 text-gray-400 hover:text-blue-600 rounded-full hover:bg-gray-100 transition">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v3m0 0v3m0-3h3m-3 0H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            </button>
            <input type="text" id="msgInput" placeholder="输入消息..." class="flex-1 px-3 py-2 text-sm focus:outline-none bg-transparent text-gray-700">
            <button id="sendBtn" onclick="sendMessage()" class="bg-blue-600 text-white rounded-full p-3 hover:bg-blue-700 shadow-md transition flex-shrink-0 active:scale-95">
                <svg class="w-5 h-5 transform rotate-45 -translate-x-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
            </button>
        </div>
    </div>

    <script>
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const ws = new WebSocket(`${protocol}//${window.location.host}/ws`);
        let myName = "";

        function showToast(text, isError = false) {
            const toast = document.getElementById('toast');
            const toastText = document.getElementById('toastText');
            toastText.innerText = text;
        
            if (isError) {
                toast.classList.remove('bg-green-500');
                toast.classList.add('bg-red-500');
            } else {
                toast.classList.remove('bg-red-500');
                toast.classList.add('bg-green-500');
            }

            toast.style.transform = "translate(-50%, 0px)";
            toast.style.opacity = "1";

            setTimeout(() => {
                toast.style.transform = "translate(-50%, -100px)";
                toast.style.opacity = "0";
            }, 3000);
        }

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);

            if (data.type === "auth_ok") {
                myName = data.sender || document.getElementById('usernameInput').value;
                showToast("🎉 登录成功，欢迎回来！");
                document.getElementById('authOverlay').classList.add('hidden');
                document.getElementById('roomTitle').innerText = `你好，${myName}`;
            } else if (data.type === "auth_err") {
                showToast(data.content, true);
            } else if (data.type === "msg") {
                appendMessage(data.sender, data.content, data.sender === myName);
            }
        };

        function handleAuth(action) {
            const u = document.getElementById('usernameInput').value.trim();
            const p = document.getElementById('passwordInput').value.trim();
            if(!u || !p) return showToast("请填写完整账号密码！", true);
            ws.send(JSON.stringify({ action: action, username: u, password: p }));
        }

        function sendMessage() {
            const input = document.getElementById('msgInput');
            if (!input.value.trim()) return;
            ws.send(JSON.stringify({ action: "msg", content: input.value }));
            input.value = "";
        }

        function appendMessage(sender, text, isMe) {
            const chatBox = document.getElementById('chatBox');
            const wrapper = document.createElement('div');
            wrapper.className = `flex flex-col ${isMe ? 'items-end' : 'items-start'} space-y-0.5`;

            const nameLabel = document.createElement('span');
            nameLabel.className = 'text-[11px] text-gray-400 font-medium px-2';
            nameLabel.innerText = sender;

            const bubble = document.createElement('div');
            bubble.className = `max-w-[75%] rounded-[20px] px-4 py-2.5 shadow-sm text-sm ${
                isMe ? 'bg-blue-600 text-white rounded-tr-none' : 'bg-white text-gray-800 rounded-tl-none border border-gray-100'
            }`;
            bubble.innerText = text;

            wrapper.appendChild(nameLabel);
            wrapper.appendChild(bubble);
            chatBox.appendChild(wrapper);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // 升级版回车发送：更坚固，不怕第三方垃圾脚本干扰
    document.getElementById('msgInput').addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault(); // 阻止默认换行行为
            sendMessage();
        }
    });
    </script>
</body>
</html>
