<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5.0, user-scalable=yes">
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>局域网通讯 | 公共聊天室</title>
    <script src="./viewport-adapter.js"></script>
    <script src="./tailwind.browser.js"></script>
    <script src="./chatHistory.js"></script>
    <!-- 根据设备自动加载对应 CSS -->
    <link rel="stylesheet" href="./style-desktop.css" media="(min-width: 768px)">
    <link rel="stylesheet" href="./style-mobile.css" media="(max-width: 767px)">
</head>
<body class="bg-slate-100 w-full flex items-center justify-center font-sans antialiased select-none" style="height: 100dvh; height: 100vh;">

    <style>
        body {
            margin: 0;
            padding: 0;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            height: 100dvh;
            height: 100vh;
            width: 100vw;
        }

        .fade-in-up {
            animation: fadeInUp 280ms ease-out both;
        }

        .chat-bubble {
            animation: bubbleIn 180ms ease-out both;
        }

        .chat-bubble.pending {
            border: 1px dashed rgba(255,255,255,0.5);
            opacity: 0.84;
            filter: saturate(0.85);
        }

        .chat-bubble.own-message {
            cursor: pointer;
            transition: transform 150ms ease, box-shadow 150ms ease, background-color 150ms ease;
        }

        .chat-bubble.own-message:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 18px rgba(15, 23, 42, 0.14);
        }

        .withdraw-option {
            position: absolute;
            left: -76px;
            top: 50%;
            transform: translateY(-50%) translateX(-10px);
            background: #ef4444;
            color: #fff;
            border: none;
            border-radius: 999px;
            padding: 0.45rem 0.85rem;
            font-size: 0.72rem;
            line-height: 1;
            cursor: pointer;
            box-shadow: 0 16px 30px rgba(15, 23, 42, 0.18);
            opacity: 0;
            transition: opacity 160ms ease, transform 160ms ease;
            z-index: 10;
            pointer-events: none;
        }

        .withdraw-option.show {
            opacity: 1;
            transform: translateY(-50%) translateX(0);
            pointer-events: auto;
        }

        .withdraw-option.mobile {
            left: auto;
            right: 0;
            top: auto;
            bottom: 100%;
            transform: translateY(-10px);
        }

        .withdraw-option.mobile.show {
            transform: translateY(0);
        }

        .message-wrapper {
            position: relative;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes bubbleIn {
            from { opacity: 0; transform: translateY(8px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
    </style>

    <div id="loginPanel" class="bg-white p-6 md:p-8 rounded-2xl shadow-2xl w-full md:w-96 mx-4 md:mx-auto transition-all duration-300 fade-in-up">
        <div class="mb-6 text-center">
            <h2 class="text-2xl font-bold text-slate-800 tracking-wide">校内局域网通讯</h2>
            <p class="text-sm text-slate-400 mt-1">网络通信平台 · 公共聊天室</p>
        </div>
        <div class="space-y-4">
            <div>
                <label class="block text-xs font-semibold text-slate-500 mb-1">账户名称</label>
                <input type="text" id="usernameInput" placeholder="输入用户名" 
                       class="w-full px-4 py-2 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
            </div>
            <div>
                <label class="block text-xs font-semibold text-slate-500 mb-1">登录密码</label>
                <input type="password" id="passwordInput" placeholder="输入密码" 
                       class="w-full px-4 py-2 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
            </div>
            <div id="authError" class="text-xs text-red-500 min-h-[16px]"></div>
            <div class="grid grid-cols-2 gap-3">

                    登录

                <button onclick="performRegister()" class="w-full bg-slate-100 hover:bg-slate-200 text-slate-700 font-medium py-2.5 rounded-xl transition cursor-pointer text-sm border border-slate-200">

        </div>
    </div>

    <div id="mainApp" class="hidden bg-white w-full flex overflow-hidden border border-slate-200/80" style="height: 100dvh; height: 100vh; max-height: 100dvh;" >

                    📞
                </button>
            </div>
            <button onclick="logout()" class="p-3 rounded-xl hover:bg-red-950 hover:text-red-400 transition cursor-pointer" title="安全退出">
                📤
            </button>
        </div>

                    关闭

    <!-- 邀请成员加入群聊模态框 -->
    <div id="addMemberModal" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-xs flex items-center justify-center z-50">
        <div class="bg-white rounded-2xl shadow-2xl p-6 w-96 space-y-4 max-h-[80vh] overflow-y-auto">
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-sm font-bold text-slate-800">邀请成员加入群聊</h3>
                <button onclick="toggleAddMemberModal(false)" class="text-xl text-slate-400 hover:text-slate-600 cursor-pointer">✕</button>
            </div>

            <div class="bg-slate-50 p-3 rounded-lg border border-slate-100">
                <p class="text-xs text-slate-500 mb-1">群聊</p>
                <p id="addMemberGroupName" class="text-sm font-semibold text-slate-800"></p>
            </div>

            <div>
                <label class="block text-xs font-medium text-slate-600 mb-2">选择要邀请的好友</label>
                <div id="addMemberFriendsList" class="max-h-40 overflow-y-auto border border-slate-100 rounded-lg bg-slate-50 p-2 space-y-1 text-xs">
                </div>
            </div>

            <div class="text-xs text-slate-500 bg-blue-50 p-2 rounded border border-blue-100">
                💡 选择希望邀请加入群聊的好友，已是群成员的好友会自动跳过
            </div>

            <div class="flex justify-end space-x-2 pt-2 border-t border-slate-100">
                <button onclick="toggleAddMemberModal(false)" class="px-4 py-1.5 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-lg text-xs cursor-pointer font-medium">
                    取消
                </button>
                <button onclick="submitAddMembers()" class="px-4 py-1.5 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-xs cursor-pointer font-medium">
                    邀请
                </button>
            </div>
        </div>
    </div>

    <script>
        const authTokenKey = 'lanchat_auth_token';
        const authUserKey = 'lanchat_auth_user';
        let ws = null;
        let wsOpen = false;
        let pendingAuthPayload = null;
        let currentUser = "";
        let currentTab = "chats";
        let activeTarget = null;
        let currentAvatar = { type: 'text', text: 'U', color: '#2563eb', url: '' };
        
        let globalFriends = [];
        let globalGroups = [];
        
        let cacheMessages = {
            "public:global": []
        };  

        const wsUri = "ws://" + window.location.host + "/ws";
        const httpUri = window.location.protocol + "//" + window.location.host;

        function authHeaders() {
            const token = localStorage.getItem(authTokenKey);
            return token ? { Authorization: `Bearer ${token}` } : {};
        }

        function saveAuthData(token, username) {
            if (token) {
                localStorage.setItem(authTokenKey, token);
            }
            if (username) {
                localStorage.setItem(authUserKey, username);
            }
        }

        function clearAuthData() {
            localStorage.removeItem(authTokenKey);
            localStorage.removeItem(authUserKey);
            currentUser = "";
        }

        function restoreAuthFromStorage() {
            const savedUser = localStorage.getItem(authUserKey);
            const savedToken = localStorage.getItem(authTokenKey);
            if (!savedUser || !savedToken) return;

            document.getElementById('usernameInput').value = savedUser;
            currentUser = savedUser;
            pendingAuthPayload = { action: 'resume', token: savedToken };
            initWebSocket();
        }

        function openProfile(username) {
            if (!username) return;
            // 跳转到 accounts 页面并传递用户名参数
            const url = `accounts.html?user=${encodeURIComponent(username)}`;
            window.location.href = url;
        }

        function logout() {
            clearAuthData();
            if (ws) {
                ws.close();
            }
            window.location.reload();
        }

        function isValidHexColor(value) {
            return /^#([0-9A-F]{3}|[0-9A-F]{6})$/i.test(value);
        }

        function loadAvatarConfig() {
            try {
                const raw = localStorage.getItem('lanchat_avatar');
                if (raw) {
                    const stored = JSON.parse(raw);
                    if (stored.type === 'image' && stored.url) {
                        currentAvatar.type = 'image';
                        currentAvatar.url = stored.url;
                    }
                    if (stored.text && typeof stored.text === 'string') {
                        currentAvatar.text = stored.text.slice(0, 2).toUpperCase();
                    }
                    if (stored.color && isValidHexColor(stored.color)) {
                        currentAvatar.color = stored.color;
                    }
                }
                if (!currentAvatar.text && currentUser) {
                    currentAvatar.text = currentUser.substring(0, 2).toUpperCase();
                }
            } catch (err) {
                console.warn('加载头像配置失败', err);
            }
        }

        function saveAvatarConfig() {
            localStorage.setItem('lanchat_avatar', JSON.stringify(currentAvatar));
        }

        function applyUserAvatar() {
            const avatarEl = document.getElementById('userAvatar');
            if (!avatarEl) return;
            if (currentAvatar.type === 'image' && currentAvatar.url) {
                avatarEl.style.backgroundImage = `url(${httpUri}${currentAvatar.url})`;
                avatarEl.style.backgroundColor = '';
                avatarEl.innerText = '';
            } else {
                avatarEl.style.backgroundImage = '';
                avatarEl.style.backgroundColor = currentAvatar.color || '#2563eb';
                avatarEl.innerText = currentAvatar.text || (currentUser ? currentUser.substring(0, 2).toUpperCase() : 'U');
            }
        }

        function promptChangeAvatar() {
            const choice = prompt('输入 "图片" 上传头像，或者直接输入 1-2 个字符设置文字头像', '图片');
            if (!choice) return;
            const normalized = choice.trim().toLowerCase();
            if (normalized === '图片' || normalized === 'image') {
                document.getElementById('avatarFileInput').click();
                return;
            }
            const newText = choice.trim().slice(0, 2).toUpperCase();
            const color = prompt('请输入头像背景色 HEX（例如 #0ea5e9）', currentAvatar.color || '#2563eb');
            if (color && !isValidHexColor(color.trim())) {
                alert('无效颜色格式，请输入例如 #34d399 或 #0ea5e9');
                return;
            }
            currentAvatar.type = 'text';
            currentAvatar.url = '';
            currentAvatar.text = newText || currentAvatar.text;
            if (color) currentAvatar.color = color.trim();
            saveAvatarConfig();
            applyUserAvatar();
        }
        
        function initWebSocket() {
            ws = new WebSocket(wsUri);
            ws.onopen = () => { 
                wsOpen = true;
                if (pendingAuthPayload) {
                    ws.send(JSON.stringify(pendingAuthPayload));
                    pendingAuthPayload = null;
                } else if (currentUser) {
                    syncUserRelations();
                }
            };
            ws.onmessage = (e) => {
                try {
                    const data = JSON.parse(e.data);
                    switch(data.type) {
                        case "auth_ok":
                            currentUser = document.getElementById('usernameInput').value.trim() || localStorage.getItem(authUserKey) || currentUser;
                            // 确保 token 存在再保存
                            if (data.token) {
                                saveAuthData(data.token, currentUser);
                            } else {
                                console.error('登录成功但未收到 token，尝试使用现有 token');
                                // 如果后端没有返回 token，仍然设置用户信息
                                localStorage.setItem(authUserKey, currentUser);
                            }
                            if (data.avatar_url) {
                                currentAvatar.type = 'image';
                                currentAvatar.url = data.avatar_url;
                            }
                            loadAvatarConfig();
                            applyUserAvatar();
                            document.getElementById('loginPanel').classList.add('hidden');
                            document.getElementById('mainApp').classList.remove('hidden');
                            selectActiveChat('public', 'global', '公共聊天室');
                            loadHistoryMessages('public', 'global');
                            syncUserRelations(); 
                            break;
                        case "avatar_ok":
                            if (data.avatar_url) {
                                currentAvatar.type = 'image';
                                currentAvatar.url = data.avatar_url;
                                saveAvatarConfig();
                                applyUserAvatar();
                            }
                            break;
                        case "auth_err":
                            document.getElementById('authError').innerText = data.content || "身份核验失败，请检查凭证";
                            break;
                        case "sync_data":
                            globalFriends = data.friends || [];
                            globalGroups = data.groups || [];
                            // 保存owner信息（用于权限检查）
                            globalGroups.forEach(g => {
                                if (data.groups && data.groups.length > 0) {
                                    const fullData = data.groups.find(x => x.id === g.id);
                                    if (fullData) g.owner = fullData.owner;
                                }
                            });
                            // 先自动加载所有私聊和群聊的历史消息，然后再更新侧边栏
                            loadAllPrivateChatHistory().then(() => {
                                renderSidebarList();
                            }).catch(() => {
                                renderSidebarList();
                            });
                            break;
                        case "create_group_ok":
                            const newGroup = {
                                id: parseInt(data.target_id, 10),
                                name: data.content || "新群聊"
                            };
                            if (!globalGroups.some(g => g.id === newGroup.id)) {
                                globalGroups.push(newGroup);
                            }
                            currentTab = 'chats';
                            selectActiveChat('group', data.target_id, newGroup.name);
                            loadHistoryMessages('group', data.target_id);
                            break;
                        case "create_group_err":
                            alert(data.content || "群聊创建失败，请重试");
                            break;
                        case "msg":
                            routeIncomingMessage(data);
                            break;
                        case "withdraw_message":
                            if (data && data.message_id) {
                                removeMessageFromCache(Number(data.message_id), data.target_type, data.target_id);
                            }
                            break;
                        case "withdraw_message_ok":
                            if (data && data.message_id) {
                                removeMessageFromCache(Number(data.message_id), data.target_type, data.target_id);
                            }
                            break;
                        case "rename_group_ok":
                            console.log("群聊重命名成功", data);
                            break;
                        case "rename_group_err":
                            alert("群聊重命名失败: " + (data.content || "未知错误"));
                            break;
                        case "publish_announcement_ok":
                            console.log("公告发布成功", data);
                            // 可以在聊天中显示公告信息
                            break;
                        case "publish_announcement_err":
                            alert("公告发布失败: " + (data.content || "未知错误"));
                            break;
                        case "disband_group_ok":
                            console.log("群聊已解散", data);
                            break;
                        case "disband_group_err":
                            alert("群聊解散失败: " + (data.content || "未知错误"));
                            break;
                        case "quit_group_ok":
                            console.log("已退出群聊", data);
                            break;
                        case "quit_group_err":
                            alert("退出群聊失败: " + (data.content || "未知错误"));
                            break;
                        case "add_member_ok":
                            console.log("成员邀请成功", data);
                            alert(`成功邀请了 ${data.added} 位好友加入群聊`);
                            toggleAddMemberModal(false);
                            // 重新获取群成员列表
                            if (activeTarget && activeTarget.type === 'group') {
                                loadGroupMembers();
                            }
                            break;
                        case "add_member_err":
                            alert("邀请失败: " + (data.content || "未知错误"));
                            break;
                        default:
                            break;
                    }
                } catch(err) { console.warn("消息解析错误", err); }
            };
            ws.onclose = () => { 
                wsOpen = false;
                console.warn("⚠️ 连接断开，4秒后重连...");
                setTimeout(initWebSocket, 4000); 
            };
            ws.onerror = (err) => { 
                wsOpen = false;
                console.error("WebSocket错误", err); 
            };
        }

        function performLogin() {
            const user = document.getElementById('usernameInput').value.trim();
            const pwd = document.getElementById('passwordInput').value;
            document.getElementById('authError').innerText = "";
            if(!user || !pwd) {
                document.getElementById('authError').innerText = "请输入账号和密码";
                return;
            }
            currentUser = user;
            initWebSocket();
            const loginPayload = { action: "login", username: user, password: pwd };
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify(loginPayload));
            } else {
                pendingAuthPayload = loginPayload;
            }
        }

        function performRegister() {
            const user = document.getElementById('usernameInput').value.trim();
            const pwd = document.getElementById('passwordInput').value;
            document.getElementById('authError').innerText = "";
            if(!user || !pwd) {
                document.getElementById('authError').innerText = "请输入账号和密码";
                return;
            }
            currentUser = user;
            initWebSocket();
            const registerPayload = { action: "register", username: user, password: pwd };
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify(registerPayload));
            } else {
                pendingAuthPayload = registerPayload;
            }
        }

        function syncUserRelations() {
            if(ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ action: "sync" }));
            }
        }

        // 聊天记录相关函数已分离到 chatHistory.js 文件中
        // 包括：loadHistoryMessages, loadAllPrivateChatHistory, refreshAllMessages

        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('btnTabChats').className = `p-3 rounded-xl transition cursor-pointer ${tab==='chats'?'text-white bg-slate-800':'hover:bg-slate-800 text-slate-400'}`;
            document.getElementById('btnTabFriends').className = `p-3 rounded-xl transition cursor-pointer ${tab==='friends'?'text-white bg-slate-800':'hover:bg-slate-800 text-slate-400'}`;
            renderSidebarList();
        }

        function renderSidebarList() {
            const title = document.getElementById('listTitle');
            const actions = document.getElementById('listActions');
            const content = document.getElementById('listContent');
            content.innerHTML = "";

            if (currentTab === "chats") {
                title.innerText = "最近会话";
                actions.innerHTML = "";
                const pubDiv = document.createElement('div');
                const isPublicActive = (activeTarget && activeTarget.type === 'public' && activeTarget.id === 'global');
                pubDiv.className = `p-2 md:p-3 rounded-xl cursor-pointer transition text-xs md:text-sm flex items-center space-x-2 md:space-x-3 mb-1 ${isPublicActive ? 'bg-blue-50 text-blue-700 font-semibold border-l-3 border-blue-500' : 'hover:bg-slate-100 text-slate-700'}`;
                pubDiv.innerHTML = `<span class="text-base">公共聊天室</span>`;
                pubDiv.onclick = () => { selectActiveChat('public', 'global', '公共聊天室'); loadHistoryMessages('public', 'global'); };
                content.appendChild(pubDiv);
                const sortedKeys = Object.keys(cacheMessages).filter(key => key !== "public:global");
                for (let key of sortedKeys) {
                    const [type, id] = key.split(':');
                    const div = document.createElement('div');
                    let isActive = (activeTarget && activeTarget.type === type && activeTarget.id === id);
                    div.className = `p-2 md:p-3 rounded-xl cursor-pointer transition text-xs md:text-sm flex items-center space-x-2 md:space-x-3 sidebar-item ${isActive ? 'bg-blue-50 text-blue-700 font-medium' : 'hover:bg-slate-100 text-slate-700'}`;
                    let displayName = "";
                    let icon = "私聊";
                    if (type === "group") {
                        const g = globalGroups.find(x => x.id.toString() === id);
                        displayName = g ? g.name : `群组(${id})`;
                        icon = "群组";
                    } else {
                        displayName = id;
                        icon = "私聊";
                    }
                    div.innerHTML = `<span>${icon}</span><span class="flex-1 truncate">${displayName}</span>`;
                    div.onclick = () => { selectActiveChat(type, id, displayName); loadHistoryMessages(type, id); };
                    content.appendChild(div);
                }
                const emptyGroupIds = globalGroups.filter(g => !cacheMessages[`group:${g.id}`]);
                if (emptyGroupIds.length > 0) {
                    const sectionTitle = document.createElement('div');
                    sectionTitle.className = "text-xs font-semibold text-slate-500 uppercase tracking-[0.16em] px-2 pt-4 pb-2";
                    sectionTitle.innerText = "群组";
                    content.appendChild(sectionTitle);
                    emptyGroupIds.forEach(g => {
                        const div = document.createElement('div');
                        const isActive = activeTarget && activeTarget.type === 'group' && activeTarget.id === g.id.toString();
                        div.className = `p-3 rounded-xl cursor-pointer transition text-sm flex items-center space-x-3 sidebar-item ${isActive ? 'bg-blue-50 text-blue-700 font-medium' : 'hover:bg-slate-100 text-slate-700'}`;
                        div.innerHTML = `<span class="flex-1 truncate">${g.name}</span>`;
                        div.onclick = () => selectActiveChat('group', g.id.toString(), g.name);
                        content.appendChild(div);
                    });
                }
                if(sortedKeys.length === 0 && emptyGroupIds.length === 0 && !isPublicActive) {
                    const emptyTip = document.createElement('div');
                    emptyTip.className = "text-center text-slate-400 text-xs py-6";
                    emptyTip.innerText = "暂无历史会话，可通过通讯录发起新的聊天。";
                    content.appendChild(emptyTip);
                }
            } else {
                title.innerText = "通讯录管理";
                actions.innerHTML = `
                    <div class="flex items-center space-x-2">
                        <button onclick="toggleAddFriendModal(true)" class="text-xs bg-white px-2 py-1 rounded-lg shadow-sm border border-slate-200 text-blue-600 hover:bg-blue-50 transition cursor-pointer">添加好友</button>
                        <button onclick="toggleGroupModal(true)" class="text-xs bg-white px-2 py-1 rounded-lg shadow-sm border border-slate-200 text-blue-600 hover:bg-blue-50 transition cursor-pointer">创建群组</button>
                    </div>
                `;
                if (globalFriends.length === 0 && globalGroups.length === 0) {
                    const emptyDiv = document.createElement('div');
                    emptyDiv.className = "text-center text-slate-400 text-xs py-8";
                    emptyDiv.innerText = "当前无好友或群组，可通过添加好友或创建群组开始。";
                    content.appendChild(emptyDiv);
                }
                if (globalFriends.length > 0) {
                    const friendsTitle = document.createElement('div');
                    friendsTitle.className = "text-xs font-semibold text-slate-500 uppercase tracking-[0.16em] px-2 pb-2";
                    friendsTitle.innerText = "好友列表";
                    content.appendChild(friendsTitle);
                    globalFriends.forEach(friend => {
                        const div = document.createElement('div');
                        div.className = "p-3 rounded-xl hover:bg-slate-100 cursor-pointer transition text-sm text-slate-700 flex items-center justify-between group";
                        div.innerHTML = `<span class="flex items-center gap-2">${friend}</span><span class="text-xs text-blue-500 opacity-0 group-hover:opacity-100 transition">私聊</span>`;
                        div.onclick = () => selectActiveChat('private', friend, friend);
                        content.appendChild(div);
                    });
                }
                if (globalGroups.length > 0) {
                    const groupsTitle = document.createElement('div');
                    groupsTitle.className = "text-xs font-semibold text-slate-500 uppercase tracking-[0.16em] px-2 pt-4 pb-2";
                    groupsTitle.innerText = "群组列表";
                    content.appendChild(groupsTitle);
                    globalGroups.forEach(group => {
                        const div = document.createElement('div');
                        div.className = "p-3 rounded-xl hover:bg-slate-100 cursor-pointer transition text-sm text-slate-700 flex items-center space-x-3";
                        div.innerHTML = `<span class="flex-1 truncate">${group.name}</span>`;
                        div.onclick = () => selectActiveChat('group', group.id.toString(), group.name);

        function selectActiveChat(type, id, displayName) {
            if(!type || !id) return;
            activeTarget = { type, id, name: displayName };
            document.getElementById('emptyView').classList.add('hidden');
            document.getElementById('activeChatWindow').classList.remove('hidden');
            document.getElementById('activeChatName').innerHTML = type === 'public' ? '公共聊天室' : `${displayName}`;
            let metaText = "";
            if (type === "public") metaText = "校内公共聊天室，所有在线成员可见";
            else if (type === "group") metaText = "群组讨论，仅群成员可见";
            else metaText = "私聊通道，仅发送双方可见";
            document.getElementById('activeChatMeta').innerText = metaText;
            const sessionKey = `${type}:${id}`;
            if (!cacheMessages[sessionKey]) cacheMessages[sessionKey] = [];
            renderChatBubbles();
            renderSidebarList();
            
            // 显示/隐藏在线人数（仅公共聊天室显示）
            const onlineCountBadge = document.getElementById('onlineCountBadge');
            if (type === 'public') {
                onlineCountBadge.classList.remove('hidden');
                updateOnlineCount();
                // 每10秒更新一次在线人数
                if (window.onlineCountInterval) clearInterval(window.onlineCountInterval);
                window.onlineCountInterval = setInterval(updateOnlineCount, 10000);
            } else {
                onlineCountBadge.classList.add('hidden');
                if (window.onlineCountInterval) clearInterval(window.onlineCountInterval);
            }
            
            // 关闭菜单
            document.getElementById('chatMenu').classList.add('hidden');
            
            // 手机上选择聊天后自动关闭侧边栏
            if (window.innerWidth < 768) {
                toggleSidebar(false);
            }
        }

        // 消息路由函数已分离到 chatHistory.js

        function renderChatBubbles() {
            if (!activeTarget) return;
            const box = document.getElementById('chatBox');
            box.innerHTML = "";
            const sessionKey = `${activeTarget.type}:${activeTarget.id}`;
            const messages = cacheMessages[sessionKey] || [];
            if (messages.length === 0) {
                const emptyTip = document.createElement('div');
                emptyTip.className = "flex justify-center items-center h-full text-slate-300 text-xs md:text-sm";
                emptyTip.innerText = "暂无消息，开始发送内容以展开对话。";
                box.appendChild(emptyTip);
                return;
            }
            messages.forEach(msg => {
                const isMe = msg.sender === currentUser;
                const wrapper = document.createElement('div');
                wrapper.className = `flex ${isMe ? 'justify-end' : 'justify-start'} mb-2 md:mb-3`;
                const body = document.createElement('div');
                body.className = `flex ${isMe ? 'items-end' : 'items-start'} space-x-1 md:space-x-2 max-w-[90%] md:max-w-[80%] ${isMe ? 'ml-auto' : 'mr-auto'}`;

                const avatarCell = document.createElement('div');
                avatarCell.className = 'w-7 h-7 md:w-9 md:h-9 rounded-full overflow-hidden flex items-center justify-center bg-slate-200 text-[9px] md:text-[11px] font-semibold text-slate-700 flex-shrink-0';
                if (msg.avatar_url) {
                    const img = document.createElement('img');
                    img.src = httpUri + msg.avatar_url;
                    img.className = 'w-full h-full object-cover';
                    avatarCell.appendChild(img);
                } else {
                    avatarCell.innerText = msg.sender.slice(0, 2).toUpperCase();
                }
                // 点击头像查看用户主页
                avatarCell.style.cursor = 'pointer';
                avatarCell.title = msg.sender;
                avatarCell.addEventListener('click', (e) => {
                    e.stopPropagation();
                    openProfile(msg.sender);
                });
                if (isMe) body.appendChild(buildMessageBubble(msg, isMe));
                body.appendChild(avatarCell);
                if (!isMe) body.appendChild(buildMessageBubble(msg, isMe));
                wrapper.appendChild(body);
                box.appendChild(wrapper);
            });
            box.scrollTop = box.scrollHeight;
        }

        function buildMessageBubble(msg, isMe) {
            const wrapper = document.createElement('div');
            wrapper.className = 'flex flex-col space-y-0.5 md:space-y-1 message-wrapper';
            if (msg.timestamp) {
                const timeLabel = document.createElement('span');
                timeLabel.className = 'text-[8px] md:text-[10px] text-slate-400 px-1';
                const date = new Date(msg.timestamp * 1000);
                timeLabel.innerText = date.toLocaleString('zh-CN', {
                    month: '2-digit',
                    day: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit',
                    hour12: false
                });
                wrapper.appendChild(timeLabel);
            }
            const senderSpan = document.createElement('span');
            senderSpan.className = 'text-[8px] md:text-[11px] text-slate-400 px-1 font-medium flex items-center gap-1';
            senderSpan.innerHTML = isMe ? `🔹 ${msg.sender} · 我` : `🔸 ${msg.sender}`;
            wrapper.appendChild(senderSpan);

            const bubble = document.createElement('div');
            bubble.className = `px-3 md:px-4 py-1.5 md:py-2 rounded-2xl text-xs md:text-sm break-all shadow-sm transition-fast ${isMe ? 'bg-blue-600 text-white rounded-tr-none' : 'bg-white text-slate-800 rounded-tl-none border border-slate-100'} chat-bubble`;
            if (msg.pending) {
                bubble.classList.add('pending');
            }
            if (msg.content && msg.content.startsWith('/uploads/')) {
                const img = document.createElement('img');
                img.src = httpUri + msg.content;
                img.className = 'max-w-[150px] md:max-w-[220px] max-h-40 rounded-lg my-1 cursor-pointer object-cover chat-bubble-img';
                img.onclick = () => window.open(img.src);
                bubble.appendChild(img);
            } else {
                bubble.innerText = msg.content || '[空消息]';
            }

            if (isMe && !msg.pending) {
                bubble.classList.add('own-message');
                const isMobile = window.innerWidth < 768;

                let longPressTimer = null;
                const showOption = () => {
                    toggleWithdrawOption(wrapper, msg, isMobile);
                };
                const startLongPress = () => {
                    longPressTimer = setTimeout(showOption, 600);
                };
                const cancelLongPress = () => {
                    if (longPressTimer) {
                        clearTimeout(longPressTimer);
                        longPressTimer = null;
                    }
                };

                bubble.addEventListener('click', (e) => {
                    if (!isMobile) {
                        e.stopPropagation();
                        toggleWithdrawOption(wrapper, msg, false);
                    }
                });
                bubble.addEventListener('touchstart', startLongPress);
                bubble.addEventListener('touchend', cancelLongPress);
                bubble.addEventListener('touchcancel', cancelLongPress);
                bubble.addEventListener('touchmove', cancelLongPress);
            }

            wrapper.appendChild(bubble);
            return wrapper;
        }

        function appendPendingMessage(content) {
            if (!activeTarget) return;
            const sessionKey = `${activeTarget.type}:${activeTarget.id}`;
            if (!cacheMessages[sessionKey]) cacheMessages[sessionKey] = [];
            const pendingMsg = {
                id: -Date.now(),
                target_type: activeTarget.type,
                target_id: activeTarget.id,
                sender: currentUser,
                content: content,
                timestamp: Math.floor(Date.now() / 1000),
                avatar_url: currentAvatar.url || '',
                pending: true
            };
            cacheMessages[sessionKey].push(pendingMsg);
            renderChatBubbles();
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            if (!input) {
                alert("消息输入框未找到，请刷新页面");
                return;
            }
            const text = input.value.trim();
            if (!text) {
                alert("消息内容不能为空");
                return;
            }
            if (!activeTarget) {
                alert("请先选择一个会话");
                return;
            }
            const payload = {
                action: "msg",
                target_type: activeTarget.type,
                target_id: activeTarget.id,
                content: text
            };
            if (ws && ws.readyState === WebSocket.OPEN) {
                appendPendingMessage(text);
                try {
                    ws.send(JSON.stringify(payload));
                    input.value = "";
                } catch (err) {
                    console.error("消息发送失败：", err);
                    alert("消息发送失败，请检查连接或刷新页面");
                }
            } else {
                alert("连接已断开，请刷新页面重试");
            }
        }

        function toggleWithdrawOption(wrapper, msg, isMobile) {
            hideWithdrawOptions();
            const existing = wrapper.querySelector('.withdraw-option');
            if (existing) {
                existing.remove();
            }
            const option = document.createElement('button');
            option.type = 'button';
            option.className = 'withdraw-option';
            if (isMobile) {
                option.classList.add('mobile');
            }
            option.innerText = '撤回';
            option.onclick = (e) => {
                e.stopPropagation();
                withdrawMessage(msg);
            };
            wrapper.appendChild(option);
            requestAnimationFrame(() => option.classList.add('show'));
            option._hideTimer = setTimeout(() => {
                hideWithdrawOption(option);
            }, 4000);
        }

        function hideWithdrawOption(option) {
            if (!option) return;
            clearTimeout(option._hideTimer);
            option.classList.remove('show');
            setTimeout(() => {
                if (option.parentElement) {
                    option.remove();
                }
            }, 200);
        }

        function hideWithdrawOptions() {
            document.querySelectorAll('.withdraw-option').forEach(option => hideWithdrawOption(option));
        }

        function withdrawMessage(msg) {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                alert('撤回失败：未连接到服务器');
                return;
            }
            if (!msg || !msg.id) {
                alert('撤回失败：消息不存在');
                return;
            }
            ws.send(JSON.stringify({
                action: 'withdraw_message',
                message_id: msg.id,
                target_type: msg.target_type,
                target_id: msg.target_id
            }));
            hideWithdrawOptions();
        }

        function removeMessageFromCache(messageId, targetType, targetId) {
            const sessionKey = `${targetType}:${targetId}`;
            if (!cacheMessages[sessionKey]) return;
            cacheMessages[sessionKey] = cacheMessages[sessionKey].filter(m => m.id !== messageId);
            if (activeTarget && `${activeTarget.type}:${activeTarget.id}` === sessionKey) {
                renderChatBubbles();
            }
        }

        function handleMessageInputKeydown(event) {
            if (event && event.key === 'Enter') {
                event.preventDefault();
                sendMessage();
            }
        }

        function triggerImageUpload() {
            document.getElementById('imageFileInput').click();
        }

        async function uploadFileToServer(inputEl) {
            if (!inputEl.files || inputEl.files.length === 0) return;
            if (!activeTarget) {
                alert("请先打开一个聊天窗口再发送图片");
                inputEl.value = "";
                return;
            }
            const file = inputEl.files[0];
            if (!file.type.match('image.*')) {
                alert("仅支持图片格式 (jpg/png/gif)");
                inputEl.value = "";
                return;
            }
            const formData = new FormData();
            formData.append('image', file);
            try {
                const response = await fetch(`${httpUri}/api/upload`, {
                    method: 'POST',
                    headers: authHeaders(),
                    body: formData,
                    credentials: 'same-origin'
                });
                const result = await response.json();
                if (response.ok && result.url) {
                    const payload = {
                        action: "msg",
                        target_type: activeTarget.type,
                        target_id: activeTarget.id,
                        content: result.url
                    };
                    if (ws && ws.readyState === WebSocket.OPEN) {
                        appendPendingMessage(result.url);
                        ws.send(JSON.stringify(payload));
                    } else {
                        alert("图片上传成功，但 WebSocket 未连接，无法发送消息内容");
                    }
                } else {
                    alert("图片上传失败: " + (result.error || "服务端异常"));
                }
            } catch (err) {
                console.error(err);
                alert("网络错误，图片传输失败");
            }
            inputEl.value = "";
        }

        async function uploadAvatarImage(inputEl) {
            if (!inputEl.files || inputEl.files.length === 0) return;
            const file = inputEl.files[0];
            if (!file.type.match('image.*')) {
                alert("仅支持图片格式 (jpg/png/gif)");
                inputEl.value = "";
                return;
            }
            const formData = new FormData();
            formData.append('image', file);
            try {
                const response = await fetch(`${httpUri}/api/upload`, {
                    method: 'POST',
                    headers: authHeaders(),
                    body: formData,
                    credentials: 'same-origin'
                });
                const result = await response.json();
                if (response.ok && result.url) {
                    if (ws && ws.readyState === WebSocket.OPEN) {
                        ws.send(JSON.stringify({ action: "update_avatar", content: result.url }));
                        currentAvatar.type = 'image';
                        currentAvatar.url = result.url;
                        saveAvatarConfig();
                        applyUserAvatar();
                    } else {
                        alert("头像上传成功，但 WebSocket 未连接，无法保存头像");
                    }
                } else {
                    alert("头像上传失败: " + (result.error || "服务端异常"));
                }
            } catch (err) {
                console.error(err);
                alert("网络错误，头像上传失败");
            }
            inputEl.value = "";
        }

        function promptAddFriend() {
            toggleAddFriendModal(true);
        }

        function toggleAddFriendModal(show) {
            const modal = document.getElementById('addFriendModal');
            const error = document.getElementById('addFriendError');
            if (show) {
                modal.classList.remove('hidden');
                document.getElementById('newFriendNameInput').value = "";
                if (ws && ws.readyState === WebSocket.OPEN) {
                    error.innerText = "";
                } else {
                    error.innerText = "WebSocket 未连接，请稍后重试。";
                }
            } else {
                modal.classList.add('hidden');
                error.innerText = "";
            }
        }

        function submitAddFriend() {
            const friendName = document.getElementById('newFriendNameInput').value.trim();
            const error = document.getElementById('addFriendError');
            error.innerText = "";
            if (!friendName) {
                error.innerText = "请输入好友账号名称。";
                return;
            }
            if (friendName === currentUser) {
                error.innerText = "不能添加自己为好友。";
                return;
            }
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ action: "add_friend", target_user: friendName }));
                toggleAddFriendModal(false);
            } else {
                error.innerText = "连接异常，请稍后重试。";
            }
        }

        function deleteFriend() {
            if (!activeTarget || activeTarget.type !== 'private') {
                alert("请先选择一个好友私聊");
                return;
            }
            const targetUser = activeTarget.id;
            const confirmed = confirm(`确定要删除好友 ${targetUser} 吗？`);
            if (!confirmed) return;
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ action: "delete_friend", target_user: targetUser }));
                globalFriends = globalFriends.filter(f => f !== targetUser);
                delete cacheMessages[`private:${targetUser}`];
                toggleChatMenu();
                if (activeTarget && activeTarget.type === 'private' && activeTarget.id === targetUser) {
                    selectActiveChat('public', 'global', '公共聊天室');
                    loadHistoryMessages('public', 'global');
                }
                renderSidebarList();
            } else {
                alert("连接异常，请稍后重试。");
            }
        }

        function toggleGroupModal(visible) {
            const modal = document.getElementById('groupModal');
            if (visible) {
                if (globalFriends.length < 2) {
                    alert("当前好友数量不足2人，无法创建群组");
                    return;
                }
                modal.classList.remove('hidden');
                const listContainer = document.getElementById('modalFriendsChecklist');
                listContainer.innerHTML = "";
                globalFriends.forEach(f => {
                    const item = document.createElement('div');
                    item.className = "group-invite-item flex items-center justify-between p-3 rounded-lg border border-slate-200 bg-white hover:bg-slate-100 cursor-pointer text-xs";
                    item.dataset.username = f;
                    item.innerHTML = `
                        <span>${f}</span>
                        <span class="invite-tag text-slate-500">点击选中</span>
                    `;
                    item.addEventListener('click', () => {
                        const tag = item.querySelector('.invite-tag');
                        item.classList.toggle('selected');
                        if (item.classList.contains('selected')) {
                            item.classList.add('bg-blue-50', 'border-blue-300');
                            tag.innerText = '已选';
                        } else {
                            item.classList.remove('bg-blue-50', 'border-blue-300');
                            tag.innerText = '点击选中';
                        }
                    });
                    listContainer.appendChild(item);
                });
                document.getElementById('newGroupName').value = "";
            } else {
                modal.classList.add('hidden');
            }
        }

        function submitCreateGroup() {
            const groupName = document.getElementById('newGroupName').value.trim();
            if (!groupName) {
                alert("群聊名称不能为空");
                return;
            }
            const selectedItems = document.querySelectorAll('#modalFriendsChecklist .group-invite-item.selected');
            if (selectedItems.length < 2) {
                alert("至少需选择 2 位好友才能创建群组");
                return;
            }
            const members = Array.from(selectedItems).map(item => item.dataset.username);
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    action: "create_group",
                    group_name: groupName,
                    members: members
                }));
                document.getElementById('newGroupName').value = "";
                toggleGroupModal(false);
            } else {
                alert("WebSocket未连接，无法创建群组");
            }
        }

        window.addEventListener('DOMContentLoaded', restoreAuthFromStorage);

        // 侧边栏展开/收起控制
        function toggleSidebar(show) {
            const sidebar = document.getElementById('sidebarList');
            const overlay = document.getElementById('sidebarOverlay');
            if (show) {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
            } else {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            }
        }

        /**
         * 群聊管理相关函数
         */

        /**
         * 打开群聊管理界面
         */
        function openGroupManagement() {
            if (!activeTarget || activeTarget.type !== 'group') {
                alert("请先选择一个群聊");
                return;
            }

            const groupId = activeTarget.id;
            const groupName = activeTarget.name;
            const group = globalGroups.find(g => g.id.toString() === groupId);

            // 显示群聊名称
            document.getElementById('groupManagementName').innerText = groupName;

            // 判断是否为群主（需要后端返回群主信息）
            // 这里假设群主信息已从服务器获取，或者通过创建者判断
            const isOwner = group && group.owner === currentUser; // 需要后端支持
            
            // 显示群主操作区域或成员信息
            if (isOwner) {
                document.getElementById('groupAdminActions').classList.remove('hidden');
                document.getElementById('groupMemberInfo').classList.add('hidden');
                document.getElementById('groupOwnerInfo').classList.remove('hidden');
                
                // 加载群成员列表
                loadGroupMembers(groupId);
            } else {
                document.getElementById('groupAdminActions').classList.add('hidden');
                document.getElementById('groupMemberInfo').classList.remove('hidden');
                document.getElementById('groupOwnerInfo').classList.add('hidden');
            }

            // 清空输入框
            document.getElementById('newGroupNameInput').value = '';
            document.getElementById('groupAnnouncementInput').value = '';

            // 显示模态框
            document.getElementById('groupManagementModal').classList.remove('hidden');
        }

        /**
         * 切换群聊管理模态框
         */
        function toggleGroupManagementModal(show) {
            const modal = document.getElementById('groupManagementModal');
            if (show) {
                modal.classList.remove('hidden');
            } else {
                modal.classList.add('hidden');
            }
        }

        /**
         * 加载群成员列表
         */
        async function loadGroupMembers(groupId) {
            try {
                const response = await fetch(`${httpUri}/api/group/${groupId}/members`, {
                    method: 'GET',
                    headers: authHeaders(),
                    credentials: 'same-origin'
                });
                const result = await response.json();
                if (result && Array.isArray(result.members)) {
                    const membersList = document.getElementById('groupMembersList');
                    membersList.innerHTML = '';
                    result.members.forEach(member => {
                        const div = document.createElement('div');
                        div.className = 'flex items-center justify-between px-2 py-1 rounded bg-white border border-slate-100';
                        div.innerHTML = `
                            <span>${member.username}</span>
                            <span class="text-[9px] text-slate-400">${member.is_owner ? '群主' : '成员'}</span>
                        `;
                        membersList.appendChild(div);
                    });
                    document.getElementById('memberCount').innerText = result.members.length;
                }
            } catch (err) {
                console.warn("加载群成员失败", err);
            }
        }

        /**
         * 重命名群聊
         */
        function renameGroup() {
            if (!activeTarget || activeTarget.type !== 'group') {
                alert("请先选择一个群聊");
                return;
            }

            const newName = document.getElementById('newGroupNameInput').value.trim();
            if (!newName) {
                alert("请输入新的群聊名称");
                return;
            }

            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    action: "rename_group",
                    group_id: activeTarget.id,
                    new_name: newName
                }));
                alert("群聊名称已更新");
                activeTarget.name = newName;
                document.getElementById('activeChatName').innerText = newName;
                document.getElementById('groupManagementName').innerText = newName;
                document.getElementById('newGroupNameInput').value = '';
                renderSidebarList();
            } else {
                alert("连接异常，请稍后重试");
            }
        }

        /**
         * 发布群聊公告
         */
        function publishAnnouncement() {
            if (!activeTarget || activeTarget.type !== 'group') {
                alert("请先选择一个群聊");
                return;
            }

            const announcement = document.getElementById('groupAnnouncementInput').value.trim();
            if (!announcement) {
                alert("请输入公告内容");
                return;
            }

            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    action: "publish_announcement",
                    group_id: activeTarget.id,
                    announcement: announcement
                }));
                alert("公告已发布");
                document.getElementById('groupAnnouncementInput').value = '';
            } else {
                alert("连接异常，请稍后重试");
            }
        }

        /**
         * 确认解散群聊
         */
        function confirmDisbandGroup() {
            if (!activeTarget || activeTarget.type !== 'group') {
                alert("请先选择一个群聊");
                return;
            }

            const confirmResult = confirm(
                `确定要解散群聊 "${activeTarget.name}" 吗？\n\n` +
                "此操作不可撤销，所有群成员将被移出，聊天记录将被保留。"
            );

            if (confirmResult) {
                disbandGroup();
            }
        }

        /**
         * 解散群聊
         */
        function disbandGroup() {
            if (!activeTarget || activeTarget.type !== 'group') {
                alert("请先选择一个群聊");
                return;
            }

            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    action: "disband_group",
                    group_id: activeTarget.id
                }));
                alert("群聊已解散");
                toggleGroupManagementModal(false);
                
                // 移除该群聊的缓存
                const sessionKey = `group:${activeTarget.id}`;
                delete cacheMessages[sessionKey];
                globalGroups = globalGroups.filter(g => g.id.toString() !== activeTarget.id);
                
                // 返回公共聊天室
                selectActiveChat('public', 'global', '公共聊天室');
                loadHistoryMessages('public', 'global');
                renderSidebarList();
            } else {
                alert("连接异常，请稍后重试");
            }
        }

        /**
         * 切换菜单显示/隐藏
         */
        function toggleChatMenu() {
            const menu = document.getElementById('chatMenu');
            const isHidden = menu.classList.contains('hidden');
            
            if (isHidden) {
                menu.classList.remove('hidden');
                // 根据当前chat类型显示相应的菜单项
                if (activeTarget) {
                    document.getElementById('groupMenuItems').classList.add('hidden');
                    document.getElementById('privateMenuItems').classList.add('hidden');
                    document.getElementById('publicMenuItems').classList.add('hidden');
                    
                    if (activeTarget.type === 'group') {
                        document.getElementById('groupMenuItems').classList.remove('hidden');
                    } else if (activeTarget.type === 'private') {
                        document.getElementById('privateMenuItems').classList.remove('hidden');
                    } else if (activeTarget.type === 'public') {
                        document.getElementById('publicMenuItems').classList.remove('hidden');
                    }
                }
            } else {
                menu.classList.add('hidden');
            }
        }

        /**
         * 点击菜单外时关闭菜单
         */
        document.addEventListener('click', function(e) {
            const chatMenu = document.getElementById('chatMenu');
            const chatMenuBtn = document.getElementById('chatMenuBtn');
            if (chatMenu && chatMenuBtn && !chatMenu.contains(e.target) && !chatMenuBtn.contains(e.target)) {
                chatMenu.classList.add('hidden');
            }
            hideWithdrawOptions();
        });

        /**
         * 切换邀请成员模态框
         */
        function toggleAddMemberModal(show) {
            const modal = document.getElementById('addMemberModal');
            if (show && activeTarget && activeTarget.type === 'group') {
                document.getElementById('addMemberGroupName').innerText = activeTarget.name;
                loadMembersForInvite();
                modal.classList.remove('hidden');
            } else {
                modal.classList.add('hidden');
            }
        }

        /**
         * 加载可邀请的好友列表（排除已是群成员的）
         */
        async function loadMembersForInvite() {
            if (!activeTarget || activeTarget.type !== 'group') return;

            try {
                // 获取当前群成员列表
                const response = await fetch(`${httpUri}/api/group/${activeTarget.id}/members`, {
                    method: 'GET',
                    headers: authHeaders(),
                    credentials: 'same-origin'
                });
                const data = await response.json();
                const currentMembers = new Set(data.members ? data.members.map(m => m.username) : []);

                // 获取可邀请的好友列表
                const availableFriends = globalFriends.filter(f => !currentMembers.has(f));

                const container = document.getElementById('addMemberFriendsList');
                container.innerHTML = '';

                if (availableFriends.length === 0) {
                    container.innerHTML = '<div class="text-slate-500 py-2 text-center">所有好友都已是群成员</div>';
                    return;
                }

                availableFriends.forEach(friend => {
                    const item = document.createElement('div');
                    item.className = 'friend-invite-item flex items-center justify-between p-3 rounded-lg border border-slate-200 bg-white hover:bg-slate-100 cursor-pointer text-sm';
                    item.setAttribute('data-username', friend);
                    item.innerHTML = `
                        <span>${friend}</span>
                        <span class="invite-tag text-slate-500 text-xs">点击选中</span>
                    `;
                    item.addEventListener('click', () => {
                        const tag = item.querySelector('.invite-tag');
                        item.classList.toggle('selected');
                        if (item.classList.contains('selected')) {
                            item.classList.add('bg-blue-50', 'border-blue-300');
                            tag.innerText = '已选';
                        } else {
                            item.classList.remove('bg-blue-50', 'border-blue-300');
                            tag.innerText = '点击选中';
                        }
                    });
                    container.appendChild(item);
                });
            } catch (err) {
                console.warn('加载可邀请好友失败', err);
                document.getElementById('addMemberFriendsList').innerHTML = '<div class="text-red-500 py-2 text-center">加载失败</div>';
            }
        }

        /**
         * 提交邀请成员
         */
        function submitAddMembers() {
            if (!activeTarget || activeTarget.type !== 'group') {
                alert("请先选择一个群聊");
                return;
            }

            const selectedItems = document.querySelectorAll('.friend-invite-item.selected');
            const selectedMembers = Array.from(selectedItems).map(item => item.dataset.username);

            if (selectedMembers.length === 0) {
                alert("请至少选择一位好友");
                return;
            }

            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    action: "add_member_to_group",
                    group_id: activeTarget.id,
                    members: selectedMembers
                }));
                // 关闭菜单
                toggleChatMenu();
            } else {
                alert("连接异常，请稍后重试");
            }
        }

        /**
         * 显示群成员列表
         */
        async function showGroupMembers() {
            if (!activeTarget || activeTarget.type !== 'group') return;

            try {
                const response = await fetch(`${httpUri}/api/group/${activeTarget.id}/members`, {
                    method: 'GET',
                    headers: authHeaders(),
                    credentials: 'same-origin'
                });
                const data = await response.json();
                const members = data.members || [];

                let memberList = '📍 群成员列表：\n\n';
                members.forEach((m, index) => {
                    const badge = m.is_owner ? ' 👑 (群主)' : '';
                    memberList += `${index + 1}. ${m.username}${badge}\n`;
                });

                alert(memberList);
            } catch (err) {
                console.warn('获取群成员失败', err);
                alert('获取群成员失败');
            }
        }

        // 清空私聊记录函数已分离到 chatHistory.js

        /**
         * 确认退出群聊
         */
        function confirmQuitGroup() {
            if (!activeTarget || activeTarget.type !== 'group') {
                alert("请先选择一个群聊");
                return;
            }

            const confirmed = confirm(`确定要退出群聊 "${activeTarget.name}" 吗？`);
            if (confirmed) {
                quitGroup();
            }
        }

        /**
         * 更新在线人数
         */
        async function updateOnlineCount() {
            try {
                const response = await fetch(`${httpUri}/api/online-users`, {
                    method: 'GET',
                    headers: authHeaders(),
                    credentials: 'same-origin'
                });
                const data = await response.json();
                document.getElementById('onlineCount').innerText = data.online_count || 0;
            } catch (err) {
                console.warn('获取在线人数失败', err);
            }
        }

        /**
         * 退出群聊
         */
        function quitGroup() {
            if (!activeTarget || activeTarget.type !== 'group') {
                alert("请先选择一个群聊");
                return;
            }

            const confirmResult = confirm(`确定要退出群聊 "${activeTarget.name}" 吗？`);

            if (confirmResult) {
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({
                        action: "quit_group",
                        group_id: activeTarget.id
                    }));
                    alert("已退出群聊");
                    toggleGroupManagementModal(false);
                    
                    // 移除该群聊的缓存
                    const sessionKey = `group:${activeTarget.id}`;
                    delete cacheMessages[sessionKey];
                    globalGroups = globalGroups.filter(g => g.id.toString() !== activeTarget.id);
                    
                    // 返回公共聊天室
                    selectActiveChat('public', 'global', '公共聊天室');
                    loadHistoryMessages('public', 'global');
                    renderSidebarList();
                } else {
                    alert("连接异常，请稍后重试");
                }
            }
        }
