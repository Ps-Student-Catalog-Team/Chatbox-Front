<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5.0, user-scalable=yes">
    <meta name="theme-color" content="#f8fafc">
    <title>聊天室控制台</title>
    <script src="./viewport-adapter.js"></script>
    <script src="./tailwind.browser.js"></script>
    <link rel="stylesheet" href="./style-desktop.css" media="(min-width: 768px)">
    <link rel="stylesheet" href="./style-mobile.css" media="(max-width: 767px)">
    <style>
        :root { color-scheme: light; }
        body { margin: 0; min-height: 100dvh; background: linear-gradient(135deg, #f8fafc 0%, #eef2ff 100%); color: #0f172a; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.86); backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px); }
        .tab-nav { position: relative; display: inline-flex; gap: 0.55rem; align-items: stretch; background: #e2e8f0; border-radius: 1.5rem; padding: 0.25rem; }
        .tab-indicator { position: absolute; top: 0.25rem; left: 0.25rem; bottom: 0.25rem; width: 0; border-radius: 1.25rem; background: #0f172a; transition: transform 240ms ease, width 240ms ease; }
        .tab-btn { position: relative; z-index: 10; border-radius: 1rem; color: #475569; text-align: center; min-width: 7rem; padding: 0.75rem 0.9rem; transition: color 180ms ease, transform 180ms ease; }
        .tab-btn.active { color: #ffffff; }
        .tab-btn:hover { color: #0f172a; transform: translateY(-1px); }
        .panel-card { animation: fadeUp 220ms ease-out both; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        #toast { transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    </style>
</head>
<body class="select-none">
    <div id="toast" class="fixed left-1/2 top-5 z-50 flex -translate-x-1/2 items-center rounded-full bg-slate-900 px-4 py-2 text-xs font-semibold text-white opacity-0 shadow-2xl" style="transform: translate(-50%, -100px);">
        <span id="toastText">提示</span>
    </div>

    <div id="loginScreen" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/85 px-4 py-6 backdrop-blur-sm">
        <div class="w-full max-w-sm rounded-[28px] border border-white/10 bg-white/10 p-7 text-center shadow-2xl backdrop-blur-xl">
            <div class="mx-auto mb-4 flex h-12 w-12 items-center justify-center rounded-2xl bg-rose-500/20 text-rose-400">
                <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                </svg>
            </div>
            <h2 class="text-xl font-bold tracking-tight text-white">安全中心</h2>
            <p class="mt-1 text-xs text-slate-300">请输入管理员密钥，默认可使用 admin666</p>
            <input id="secretInput" type="password" placeholder="输入管理员密钥..." class="mt-6 w-full rounded-2xl border border-white/10 bg-white/10 px-4 py-3 text-center text-sm font-mono text-white placeholder-slate-400 outline-none transition focus:border-rose-400 focus:ring-1 focus:ring-rose-400">
            <button id="loginBtn" class="mt-4 w-full rounded-2xl bg-rose-500 px-4 py-3 text-sm font-semibold text-white shadow-lg shadow-rose-500/20 transition hover:bg-rose-400 active:scale-[0.98]">验证并授权接入</button>
        </div>
    </div>

    <div id="adminDashboard" class="hidden min-h-screen px-3 py-3 sm:px-4 lg:px-6">
        <div class="mx-auto flex max-w-6xl flex-col gap-4">
            <header class="glass-card panel-card rounded-[28px] border border-slate-200/70 p-4 shadow-[0_10px_40px_rgba(15,23,42,0.08)] sm:p-5">
                <div class="flex flex-col gap-4 lg:flex-row lg:items-center lg:justify-between">
                    <div>
                        <div class="flex items-center gap-2">
                            <span class="h-2.5 w-2.5 animate-pulse rounded-full bg-emerald-500"></span>
                            <h1 class="text-lg font-black tracking-tight text-slate-900">聊天室控制台</h1>
                        </div>
                        <p class="mt-1 text-xs text-slate-500">管理用户、审核消息与控制全局状态</p>
                    </div>
                    <div class="flex flex-wrap items-center gap-2">
                        <div class="tab-nav text-xs font-medium text-slate-500">
                            <div id="tabIndicator" class="tab-indicator"></div>
                            <button onclick="switchTab('users')" id="tabBtn-users" class="tab-btn rounded-xl px-3 py-2 transition">👥 用户</button>
                            <button onclick="switchTab('messages')" id="tabBtn-messages" class="tab-btn rounded-xl px-3 py-2 transition">💬 消息审核</button>
                            <button onclick="switchTab('system')" id="tabBtn-system" class="tab-btn rounded-xl px-3 py-2 transition">📢 公告</button>
                            <button onclick="switchTab('extensions')" id="tabBtn-extensions" class="tab-btn rounded-xl px-3 py-2 transition">🧩 扩展</button>
                        </div>
                        <button onclick="logoutAdmin()" class="rounded-xl bg-rose-500 px-3 py-2 text-xs font-semibold text-white transition hover:bg-rose-400">退出</button>
                    </div>
                </div>
            </header>

            <main class="grid gap-4">
                <section id="panel-users" class="panel-card glass-card overflow-hidden rounded-[28px] border border-slate-200/70 shadow-[0_10px_40px_rgba(15,23,42,0.06)]">
                    <div class="flex items-center justify-between border-b border-slate-200/70 bg-slate-50/70 px-4 py-4 sm:px-6">
                        <div>
                            <p class="text-[11px] font-bold uppercase tracking-[0.22em] text-slate-500">账号与 IP 映射</p>
                            <p class="mt-1 text-xs text-slate-400">查看当前在线状态并快速删除异常账号</p>
                        </div>
                        <button onclick="refreshUsers()" class="text-sm font-semibold text-sky-600 transition hover:text-sky-500">刷新</button>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="min-w-full border-collapse text-left text-sm">
                            <thead>
                                <tr class="border-b border-slate-100 bg-white/70 text-[11px] font-bold uppercase tracking-[0.2em] text-slate-400">
                                    <th class="px-4 py-3 sm:px-6">状态</th>
                                    <th class="px-4 py-3 sm:px-6">用户名</th>
                                    <th class="px-4 py-3 sm:px-6">局域网 IP</th>
                                    <th class="px-4 py-3 text-right sm:px-6">操作</th>
                                </tr>
                            </thead>
                            <tbody id="userTableBody" class="divide-y divide-slate-100 text-sm text-slate-600">
                                <tr><td colspan="4" class="px-4 py-12 text-center text-slate-400 sm:px-6">正在加载用户列表…</td></tr>
                            </tbody>
                        </table>
                    </div>
                </section>

                <section id="panel-messages" class="panel-card glass-card hidden overflow-hidden rounded-[28px] border border-slate-200/70 shadow-[0_10px_40px_rgba(15,23,42,0.06)]">
                    <div class="flex items-center justify-between border-b border-slate-200/70 bg-slate-50/70 px-4 py-4 sm:px-6">
                        <div>
                            <p class="text-[11px] font-bold uppercase tracking-[0.22em] text-slate-500">实时公屏审核</p>
                            <p class="mt-1 text-xs text-slate-400">审查消息内容并快速撤回违规内容</p>
                        </div>
                        <button onclick="refreshMessages()" class="text-sm font-semibold text-sky-600 transition hover:text-sky-500">刷新</button>
                    </div>
                    <div id="messageStreamBody" class="max-h-[560px] divide-y divide-slate-100 overflow-y-auto"></div>
                </section>

                <section id="panel-system" class="hidden space-y-4">
                    <div class="panel-card glass-card rounded-[28px] border border-slate-200/70 p-5 shadow-[0_10px_40px_rgba(15,23,42,0.06)] sm:p-6">
                        <div>
                            <h3 class="text-sm font-bold text-slate-900">大喇叭广播</h3>
                            <p class="mt-1 text-xs text-slate-500">以“📢 系统公告”名义向全体用户发送消息</p>
                        </div>
                        <div class="mt-4 flex flex-col gap-2 sm:flex-row">
                            <input id="broadcastInput" type="text" placeholder="输入广播内容，例如：请大家下课后及时关闭设备…" class="flex-1 rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-700 outline-none transition focus:border-slate-900 focus:bg-white">
                            <button onclick="sendSystemBroadcast()" class="rounded-2xl bg-sky-600 px-4 py-3 text-sm font-semibold text-white transition hover:bg-sky-500">发送公告</button>
                        </div>
                    </div>
                </section>
                <section id="panel-extensions" class="hidden panel-card glass-card rounded-[28px] border border-slate-200/70 p-5 shadow-[0_10px_40px_rgba(15,23,42,0.06)] sm:p-6">
                    <div>
                        <h3 class="text-sm font-bold text-slate-900">扩展</h3>
                        <p class="mt-1 text-xs text-slate-500">此处为待开发扩展功能区域，暂时留空。</p>
                    </div>
                    <div class="mt-4 rounded-3xl border border-dashed border-slate-300 bg-slate-50 p-8 text-center text-sm text-slate-500">
                        这里将展示未来扩展功能模块。
                    </div>
                </section>
            </main>
        </div>
    </div>

    <script>
        const adminSecretKey = 'lanchat_admin_secret';
        let currentSecret = '';

        function saveAdminSecret(secret) { localStorage.setItem(adminSecretKey, secret); }
        function clearAdminSecret() { localStorage.removeItem(adminSecretKey); currentSecret = ''; }

        function showToast(text, isError = false) {
            const toast = document.getElementById('toast');
            const toastText = document.getElementById('toastText');
            if (!toast || !toastText) return;
            toastText.innerText = text;
            toast.classList.remove('bg-slate-900', 'bg-rose-500', 'bg-emerald-500');
            toast.classList.add(isError ? 'bg-rose-500' : 'bg-emerald-500');
            toast.style.transform = 'translate(-50%, 0)';
            toast.style.opacity = '1';
            window.clearTimeout(showToast.timer);
            showToast.timer = window.setTimeout(() => {
                toast.style.transform = 'translate(-50%, -100px)';
                toast.style.opacity = '0';
            }, 2200);
        }

        async function requestAdminUsers(secret) {
            const url = `/api/admin/users?secret=${encodeURIComponent(secret)}`;
            let response = await fetch(url, { method: 'GET', credentials: 'same-origin' });
            if (response.ok) return response;
            response = await fetch('/api/admin/users', {
                method: 'POST',
                credentials: 'same-origin',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ secret })
            });
            return response;
        }

        async function performAdminLogin(secret, silent = false) {
            if (!secret) { if (!silent) showToast('请输入密码', true); return; }
            try {
                const response = await requestAdminUsers(secret);
                if (!response.ok) throw new Error();
                currentSecret = secret;
                saveAdminSecret(secret);
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('adminDashboard').classList.remove('hidden');
                moveTabIndicator('users');
                showToast('接入成功');
                refreshUsers();
            } catch (e) {
                if (secret === 'admin666') {
                    currentSecret = secret;
                    saveAdminSecret(secret);
                    document.getElementById('loginScreen').classList.add('hidden');
                    document.getElementById('adminDashboard').classList.remove('hidden');
                    moveTabIndicator('users');
                    showToast('接入成功（本地备份认证）');
                    refreshUsers();
                    return;
                }
                if (!silent) showToast('校验未通过', true);
                clearAdminSecret();
            }
        }

        async function tryAdminLogin() { const secret = document.getElementById('secretInput').value.trim(); await performAdminLogin(secret); }
        function logoutAdmin() { clearAdminSecret(); document.getElementById('secretInput').value = ''; document.getElementById('adminDashboard').classList.add('hidden'); document.getElementById('loginScreen').classList.remove('hidden'); showToast('已退出管理员会话'); }
        async function restoreAdminLogin() { const saved = localStorage.getItem(adminSecretKey); if (!saved) return; document.getElementById('secretInput').value = saved; await performAdminLogin(saved, true); }

        function moveTabIndicator(tabName) {
            const indicator = document.getElementById('tabIndicator');
            const button = document.getElementById(`tabBtn-${tabName}`);
            const nav = indicator?.parentElement;
            if (!indicator || !button || !nav) return;
            const buttonRect = button.getBoundingClientRect();
            const navRect = nav.getBoundingClientRect();
            const offset = buttonRect.left - navRect.left;
            indicator.style.width = `${buttonRect.width}px`;
            indicator.style.transform = `translateX(${offset}px)`;
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach((btn) => btn.classList.remove('active'));
            const activeButton = document.getElementById(`tabBtn-${tabName}`);
            if (activeButton) activeButton.classList.add('active');
            moveTabIndicator(tabName);
            ['users', 'messages', 'system', 'extensions'].forEach((panel) => document.getElementById(`panel-${panel}`).classList.add('hidden'));
            document.getElementById(`panel-${tabName}`).classList.remove('hidden');
            if (tabName === 'users') refreshUsers();
            if (tabName === 'messages') refreshMessages();
        }

        function escapeHtml(value) {
            if (value === null || value === undefined) return '';
            return String(value).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
        }

        async function refreshUsers() {
            if (!currentSecret) return;
            try {
                const response = await fetch(`/api/admin/users?secret=${encodeURIComponent(currentSecret)}`);
                const data = await response.json();
                const tbody = document.getElementById('userTableBody');
                if (!Array.isArray(data) || data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" class="px-4 py-10 text-center text-slate-400 sm:px-6">目前暂无注册用户</td></tr>';
                    return;
                }
                tbody.innerHTML = data.map((u) => `
                    <tr class="hover:bg-slate-50/80 transition">
                        <td class="px-4 py-4 sm:px-6">${u.is_online ? '<span class="inline-flex items-center gap-1.5 text-emerald-600 font-semibold"><span class="h-1.5 w-1.5 rounded-full bg-emerald-500 animate-pulse"></span>在线</span>' : '<span class="text-slate-400">离线</span>'}</td>
                        <td class="px-4 py-4 font-semibold text-slate-800 sm:px-6">${escapeHtml(u.username)}</td>
                        <td class="px-4 py-4 font-mono text-slate-500 sm:px-6">${escapeHtml(u.last_ip || '—')}</td>
                        <td class="px-4 py-4 text-right sm:px-6"><button onclick="banUser(${JSON.stringify(u.username)})" class="rounded-lg bg-rose-50 px-2.5 py-1.5 text-xs font-semibold text-rose-600 transition hover:bg-rose-100">删除账户</button></td>
                    </tr>
                `).join('');
            } catch (e) { showToast('拉取用户列表失败', true); }
        }

        async function banUser(name) {
            if (!confirm(`确认删除用户 ${name} 吗？`)) return;
            try {
                const response = await fetch('/api/admin/delete-user', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ secret: currentSecret, username: name }) });
                if (!response.ok) throw new Error();
                showToast(`已删除用户 ${name}`);
                refreshUsers();
            } catch (e) { showToast('删除用户失败', true); }
        }

        async function refreshMessages() {
            if (!currentSecret) return;
            try {
                const response = await fetch(`/api/admin/messages?secret=${encodeURIComponent(currentSecret)}`);
                const data = await response.json();
                const container = document.getElementById('messageStreamBody');
                if (!Array.isArray(data) || data.length === 0) { container.innerHTML = '<div class="p-8 text-center text-slate-400">当前暂无消息</div>'; return; }
                container.innerHTML = data.map((m) => `
                    <div class="flex items-start justify-between gap-3 px-4 py-3 sm:px-6 hover:bg-slate-50/70">
                        <div class="min-w-0 flex-1">
                            <div class="mb-1 inline-flex rounded-full bg-slate-100 px-2 py-0.5 text-[10px] font-semibold uppercase tracking-[0.16em] text-slate-500">${escapeHtml(m.sender)}</div>
                            <p class="break-all text-sm text-slate-700">${escapeHtml(m.content)}</p>
                        </div>
                        <button onclick="deleteMsg(${m.ID})" class="shrink-0 text-xs font-semibold text-slate-400 transition hover:text-rose-500">撤回</button>
                    </div>
                `).join('');
            } catch (e) { showToast('拉取消息流失败', true); }
        }

        async function deleteMsg(id) {
            try {
                const response = await fetch('/api/admin/delete-message', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ secret: currentSecret, id }) });
                if (!response.ok) throw new Error();
                showToast('消息已撤回');
                refreshMessages();
            } catch (e) { showToast('撤回消息失败', true); }
        }

        async function sendSystemBroadcast() {
            if (!currentSecret) return;
            const input = document.getElementById('broadcastInput');
            const txt = input.value.trim();
            if (!txt) { showToast('请输入广播内容', true); return; }
            try {
                const response = await fetch('/api/admin/broadcast', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ secret: currentSecret, content: txt }) });
                if (!response.ok) throw new Error();
                showToast('公告发送成功');
                input.value = '';
            } catch (e) { showToast('发送公告失败', true); }
        }

        document.getElementById('loginBtn').addEventListener('click', tryAdminLogin);
        document.getElementById('secretInput').addEventListener('keydown', (event) => { if (event.key === 'Enter') tryAdminLogin(); });

        window.addEventListener('DOMContentLoaded', () => {
            restoreAdminLogin();
            window.addEventListener('resize', () => {
                const activeTab = document.querySelector('.tab-btn.active');
                if (activeTab) {
                    const tabName = activeTab.id.replace('tabBtn-', '');
                    moveTabIndicator(tabName);
                }
            });
            window.setInterval(() => {
                const loginScreen = document.getElementById('loginScreen');
                if (loginScreen.classList.contains('hidden')) {
                    if (!document.getElementById('panel-users').classList.contains('hidden')) refreshUsers();
                    if (!document.getElementById('panel-messages').classList.contains('hidden')) refreshMessages();
                }
            }, 20000);
        });
    </script>
</body>
</html>
